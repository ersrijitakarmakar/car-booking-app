<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login From</title>
    <!--Bootstrap CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">

        <div class="text-end btn-group">
            {% if "user_ID" in session %}
                <a href="/login" class="btn btn-secondary btn-sm">Dashboard</a>
            {% endif %}
            <a href="/" class="btn btn-primary btn-sm">Show All Cars</a>
        </div>

        <h1 class="display-6 mb-4 text-center">Car Booking App</h1>

        <!--For Searching cars and Submit buttan-->
        <div class="p-4 shadow-sm mb-4">
            <form action="/" method="GET">
                <div class="d-flex">
                    <input class="form-control" type="text" placeholder="Search Something" name="search">
                    <button class="btn btn-primary">Submit</button>
                </div>  
            </form>
        </div>
    
        <!--For Table of Cars-->
        <table border="1" cellpadding="8" class="table table-striped table-dark">
            <tr>
                <th>ID</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Color</th>
                <th>Action</th>
            </tr>

            {% for car in cars %}
            <tr>
                <td>{{ car[0] }}</td>
                <td>{{ car[1] }}</td>
                <td>{{ car[2] }}</td>
                <td>{{ car[3] }}</td>
                <td>
                    <button class="btn btn-info btn-sm">Book Car</button>
                    
                    <button 
                        class="btn btn-outline-info btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#carModal"
                        onclick="showDetails('{{ car[0] }}','{{ car[1] }}','{{ car[2] }}','{{ car[3] }}','{{car[4]}}','{{car[5]}}' )">
                        View Car Details
                    </button>

                </td>
            </tr>
            {% endfor %}

        </table>
    </div>



    <div class="modal fade" id="carModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Car Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="card border-0 shadow-sm">
                        <div class="card-body">

                            <div class="row mb-3">
                                <div class="col-5 text-muted">Car ID</div>
                                <div class="col-7 fw-bold text-primary" id="modal-id"></div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-5 text-muted">Brand</div>
                                <div class="col-7 fw-semibold" id="modal-brand"></div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-5 text-muted">Model</div>
                                <div class="col-7 fw-semibold" id="modal-model"></div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-5 text-muted">Color</div>
                                <div class="col-7">
                                    <span class="badge bg-dark fs-6" id="modal-color"></span>
                                </div>
                            </div>

                            <hr>

                            <div class="row mb-3">
                                <div class="col-5 text-muted">Car Number</div>
                                <div class="col-7 fw-semibold text-success" id="modal-car-number"></div>
                            </div>

                            <div class="row">
                                <div class="col-5 text-muted">Registration No</div>
                                <div class="col-7 fw-semibold text-danger" id="modal-registration-no"></div>
                            </div>

                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" 
                            class="btn btn-secondary" 
                            data-bs-dismiss="modal">
                            Close
                    </button>
                </div>

            </div>
        </div>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script>
        function showDetails(id, brand, model, color, car_number, registration_no) {
            document.getElementById("modal-id").innerText = id;
            document.getElementById("modal-brand").innerText = brand;
            document.getElementById("modal-model").innerText = model;
            document.getElementById("modal-color").innerText = color;
            document.getElementById("modal-car-number").innerText = car_number;
            document.getElementById("modal-registration-no").innerText = registration_no;
        }
    </script>
</body>
</html>
