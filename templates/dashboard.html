<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--Bootstrap CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card{
            position: sticky;
            top: 30px;
            height: max-content;
        }
    </style>
</head>

<body>

   <!--A Form for Adding Cars Details-->
    <div class="container-fluid">
        <div class="row align-items-start">
            <div class="col-md-4">
                <div class="card shadow p-4 mt-3">
                    <h3 class="text-center ">Add New Cars</h3>
                    <form action="/dashboard" method="POST">
                        <label class="fw-semibold" for="">Brand Name :</label>
                        <input class="w-100 mt-2" type="text" placeholder="Brand Name" name="brand"><br><br>
                        <label class="fw-semibold" for="">Model Name :</label>
                        <input class="w-100" type="text" placeholder="Model Name" name="model"><br><br>
                        <label class="fw-semibold" for="">Color :</label>
                        <input class="w-100" type="text" placeholder="color" name="color"><br><br>
                        <label class="fw-semibold" for="">Car Number :</label>
                        <input class="w-100" type="text" placeholder="Car Number" name="car_number"><br><br>
                        <label class="fw-semibold" for="">Car Registration No. :</label>
                        <input class="w-100" type="text" placeholder="Registration Number" name="registration_no"><br><br>
                        <button class="w-100 rounded-2 border-0 p-1">submit</button><br><br>
                    </form>
                    
                    <p class="justify-content-center fst-italic d-flex align-item-center"><a href="/">Back to Home</a></p>
                    <a class="justify-content-center d-flex align-item-center btn btn-danger" href="/logout">Log Out</a>

                </div>
            </div>
            <div class="col-md-8">
                <table border="1" cellpadding="8" class="table table-striped table-dark mt-3">
            <tr>
                <th>ID</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Color</th>
                <th>Action</th>

            </tr>
            {% for car in cars %}
            <tr>
                <td>{{ car[0] }}</td>
                <td>{{ car[1] }}</td>
                <td>{{ car[2] }}</td>
                <td>{{ car[3] }}</td>
                <td>
                    <button class="btn btn-info btn-sm">Edit</button>
                    <!-- <button class="btn btn-outline-info btn-sm">View Car Details</button> -->
                </td>
            </tr>
            {% endfor %}
        </table>

            </div>
        </div>
    </div>

    <!--Success Massage And Error Massage-->
    {% if error %}
    <p class="text-center fs-3 mt-2" style="color:red;">{{ error }}</p>
    {% endif %}

    {% if success %}
    <p class="text-center fs-3 mt-2" style="color:green;">{{ success }}</p>
    {% endif %}

    
    


</body>
</html>
